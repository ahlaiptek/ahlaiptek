<!DOCTYPE html>
<html lang="id">

<head>

                    <div className="card">

                            <a href="https://github.com/user/project1" className="btn btn-primary">GitHub Repo</a>
                        </div>
                    </div>
                    <div className="card">
                        <div className="card-body">
                            <h5 className="card-title">Project 2</h5>
                            <p className="card-text">Description of Project 2</p>

                    <hr />

</body>

</html>
